deploymentMode: SingleBinary
loki:
  auth_enabled: false
  commonConfig:
    replication_factor: 1
  storage:
    type: filesystem   # dev; prod usa S3 + IRSA (ver values/aws-prod/loki.yaml)
  schemaConfig:
    configs:
      - from: "2024-01-01"
        store: tsdb
        object_store: filesystem
        schema: v13
        index:
          prefix: index_
          period: 24h
singleBinary:
  replicas: 1
# Desactivar componentes del modo distribuido
backend:
  replicas: 0
read:
  replicas: 0
write:
  replicas: 0
