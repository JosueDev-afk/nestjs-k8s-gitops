deploymentMode: SingleBinary
loki:
  auth_enabled: false
  commonConfig:
    replication_factor: 1
  storage:
    type: s3
    bucketNames:
      chunks: REPLACE_ME_LOKI_BUCKET_PROD
      ruler: REPLACE_ME_LOKI_BUCKET_PROD
      admin: REPLACE_ME_LOKI_BUCKET_PROD
    s3:
      region: us-east-1
  schemaConfig:
    configs:
      - from: "2024-01-01"
        store: tsdb
        object_store: s3
        schema: v13
        index:
          prefix: index_
          period: 24h
singleBinary:
  replicas: 1
serviceAccount:
  annotations:
    # REPLACE_ME: rol IRSA con acceso al bucket (crear en la capa platform de prod)
    eks.amazonaws.com/role-arn: REPLACE_ME_LOKI_IRSA_ROLE_ARN
backend:
  replicas: 0
read:
  replicas: 0
write:
  replicas: 0
