# Application raíz (App-of-Apps) del entorno aws-prod. Ver root-app-aws-dev.yaml.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: root-aws-prod
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://github.com/JosueDev-afk/nestjs-k8s-gitops.git
    targetRevision: main
    path: apps/aws-prod
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=false
