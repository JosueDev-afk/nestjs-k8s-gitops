# Application raíz (patrón App-of-Apps) del entorno aws-dev.
# La aplica Terraform (capa platform) al hacer bootstrap del clúster; a partir
# de ahí ArgoCD sincroniza todo lo que haya en apps/aws-dev/.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: root-aws-dev
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://github.com/JosueDev-afk/nestjs-k8s-gitops.git
    targetRevision: main
    path: apps/aws-dev
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=false
